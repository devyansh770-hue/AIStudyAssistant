services:
  - type: web
    name: ai-study-assistant
    runtime: python
    pythonVersion: "3.12"
    buildCommand: "pip install --upgrade pip && pip install --no-cache-dir -r requirements.txt && python manage.py collectstatic --no-input && python manage.py migrate"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.12.9"
