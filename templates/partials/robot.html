<div class="robot-container">
    <div class="robot-wrapper">
        <svg class="robot-svg" viewBox="0 0 300 400" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
                    <feGaussianBlur stdDeviation="3.5" result="blur" />
                    <feComposite in="SourceGraphic" in2="blur" operator="over" />
                </filter>
            </defs>

            <!-- Antenna -->
            <line x1="150" y1="100" x2="150" y2="70" stroke="#00d8d6" stroke-width="3" />
            <circle cx="150" cy="70" r="8" fill="rgba(0, 216, 122, 0.1)" stroke="#00d8d6" stroke-width="1.5" filter="url(#neonGlow)" />
            <circle cx="150" cy="70" r="3" fill="#00d8d6" />

            <!-- Ears -->
            <circle cx="75" cy="155" r="10" fill="#0f172a" stroke="#00d8d6" stroke-width="3" />
            <circle cx="225" cy="155" r="10" fill="#0f172a" stroke="#00d8d6" stroke-width="3" />

            <!-- Head -->
            <rect x="75" y="100" width="150" height="110" rx="30" ry="30" fill="#0f172a" stroke="#00d8d6" stroke-width="4" filter="url(#neonGlow)" />
            
            <!-- Eyes -->
            <g id="eyes-group">
                <!-- Left Eye -->
                <circle cx="115" cy="145" r="22" fill="#020617" stroke="#00d8d6" stroke-width="1.5" />
                <circle id="left-pupil" cx="115" cy="145" r="9" fill="#00d8d6" filter="url(#neonGlow)" />
                <circle cx="118" cy="142" r="3" fill="white" />
                <!-- Right Eye -->
                <circle cx="185" cy="145" r="22" fill="#020617" stroke="#00d8d6" stroke-width="1.5" />
                <circle id="right-pupil" cx="185" cy="145" r="9" fill="#00d8d6" filter="url(#neonGlow)" />
                <circle cx="188" cy="142" r="3" fill="white" />
            </g>

            <!-- Smile -->
            <path d="M 120 185 Q 150 205 180 185" fill="none" stroke="#00d8d6" stroke-width="3" stroke-linecap="round" />

            <!-- Neck -->
            <rect x="135" y="210" width="30" height="15" rx="5" fill="#00d8d6" filter="url(#neonGlow)" />

            <!-- Body -->
            <rect x="80" y="225" width="140" height="110" rx="20" ry="20" fill="#0f172a" stroke="#00d8d6" stroke-width="4" filter="url(#neonGlow)" />
            
            <!-- Screen inside Body -->
            <rect x="95" y="240" width="110" height="65" rx="10" fill="#020617" stroke="rgba(0, 216, 214, 0.4)" stroke-width="1" />
            <line x1="105" y1="255" x2="195" y2="255" stroke="#00d8d6" stroke-width="2" opacity="0.8" />
            <line x1="105" y1="265" x2="160" y2="265" stroke="#00d8d6" stroke-width="2" opacity="0.5" />
            <line x1="105" y1="275" x2="185" y2="275" stroke="#00d8d6" stroke-width="2" opacity="0.7" />
            <line x1="105" y1="285" x2="150" y2="285" stroke="#00d8d6" stroke-width="2" opacity="0.4" />
            
            <!-- Dashboard dots -->
            <circle cx="125" cy="315" r="5" fill="#00d8d6" />
            <circle cx="150" cy="315" r="5" fill="#00d8d6" opacity="0.3" />
            <circle cx="175" cy="315" r="5" fill="#00d8d6" opacity="0.6" />

            <!-- Arms -->
            <rect x="45" y="235" width="30" height="70" rx="15" fill="#0f172a" stroke="#00d8d6" stroke-width="3" filter="url(#neonGlow)" />
            <rect x="225" y="235" width="30" height="70" rx="15" fill="#0f172a" stroke="#00d8d6" stroke-width="3" filter="url(#neonGlow)" />

            <!-- Legs -->
            <rect x="105" y="335" width="35" height="35" rx="10" fill="#0f172a" stroke="#00d8d6" stroke-width="3" filter="url(#neonGlow)" />
            <rect x="160" y="335" width="35" height="35" rx="10" fill="#0f172a" stroke="#00d8d6" stroke-width="3" filter="url(#neonGlow)" />
            
            <rect x="100" y="375" width="45" height="12" rx="5" fill="#0f172a" stroke="#00d8d6" stroke-width="3" filter="url(#neonGlow)" />
            <rect x="155" y="375" width="45" height="12" rx="5" fill="#0f172a" stroke="#00d8d6" stroke-width="3" filter="url(#neonGlow)" />
        </svg>
    </div>
</div>

<style>
.robot-container {
    position: relative;
    max-width: 260px;
    margin: 0;
}
.robot-wrapper {
    display: flex;
    flex-basis: 260px;
    margin-top: 0;
    flex-direction: column;
    align-items: center;
    position: relative;
}
.robot-svg {
    width: 100%;
    height: auto;
    filter: drop-shadow(0 0 10px rgba(0, 216, 214, 0.1));
}
</style>

<script>
(function() {
    const leftPupil = document.getElementById('left-pupil');
    const rightPupil = document.getElementById('right-pupil');
    
    if (!leftPupil) return;

    document.addEventListener('mousemove', (e) => {
        [leftPupil, rightPupil].forEach(eye => {
            const rect = eye.getBoundingClientRect();
            const eyeX = rect.left + rect.width / 2;
            const eyeY = rect.top + rect.height / 2;
            
            const dx = e.clientX - eyeX;
            const dy = e.clientY - eyeY;
            const angle = Math.atan2(dy, dx);
            const dist = Math.min(8, Math.hypot(dx, dy) / 35);
            
            const mx = Math.cos(angle) * dist;
            const my = Math.sin(angle) * dist;
            
            eye.setAttribute('transform', `translate(${mx}, ${my})`);
        });
    });
})();
</script>
