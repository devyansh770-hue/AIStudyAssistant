<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Verify Reset OTP — StudyAI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body{background:linear-gradient(135deg,#0a0a1a,#090979);min-height:100vh;display:flex;align-items:center;color:white;}
    .card{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);border-radius:20px;backdrop-filter:blur(20px);}
    .otp-input{background:rgba(255,255,255,0.1)!important;border:2px solid rgba(108,99,255,0.5)!important;color:white!important;border-radius:12px;font-size:2rem;letter-spacing:16px;text-align:center;padding:16px;}
    .otp-input:focus{border-color:#6c63ff!important;box-shadow:0 0 20px rgba(108,99,255,0.4)!important;}
    .btn-verify{background:linear-gradient(135deg,#6c63ff,#00d4ff);border:none;border-radius:12px;padding:14px;font-weight:700;}
  </style>
</head>
<body>
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card p-4 p-md-5">
        <div class="text-center mb-4">
          <div style="font-size:3rem">🔑</div>
          <h4 class="fw-bold mt-2">Enter Reset OTP</h4>
          <p class="text-white-50 small">OTP sent to <strong class="text-white">{{ email }}</strong></p>
        </div>
        {% if messages %}
          {% for msg in messages %}
            <div class="alert alert-danger py-2 small text-center">{{ msg }}</div>
          {% endfor %}
        {% endif %}
        <form method="post">
          {% csrf_token %}
          <div class="mb-4">{{ form.code }}</div>
          <button type="submit" class="btn btn-verify w-100 text-white">
            Verify OTP
          </button>
        </form>
        <p class="text-center mt-3 small">
          <a href="{% url 'accounts:password_reset_request' %}" style="color:#00d4ff">
            ← Request new OTP
          </a>
        </p>
        <p class="text-center text-white-50 small mt-2">
          Expires in <span id="cd" style="color:#00d4ff;font-weight:700">15:00</span>
        </p>
      </div>
    </div>
  </div>
</div>
<script>
let t = 900;
const el = document.getElementById('cd');
setInterval(() => {
  t--;
  el.textContent = `${String(Math.floor(t/60)).padStart(2,'0')}:${String(t%60).padStart(2,'0')}`;
  if(t<=0){el.textContent='Expired';el.style.color='#ff6584';}
}, 1000);
</script>
</body>
</html>
