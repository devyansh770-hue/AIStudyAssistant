<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password — StudyAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#06060f,#0f172a,#1e1b4b);min-height:100vh;display:flex;align-items:center;color:white;-webkit-font-smoothing:antialiased;}
    .card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:24px;backdrop-filter:blur(20px);animation:fadeIn 0.5s ease;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    .form-control{background:rgba(255,255,255,0.06)!important;border:1px solid rgba(255,255,255,0.12)!important;color:white!important;border-radius:12px;padding:13px 16px;transition:all 0.2s;}
    .form-control::placeholder{color:rgba(255,255,255,0.3);}
    .form-control:focus{border-color:#6366f1!important;box-shadow:0 0 15px rgba(99,102,241,0.25)!important;}
    .btn-send{background:linear-gradient(135deg,#6366f1,#06b6d4);border:none;border-radius:12px;padding:13px;font-weight:700;transition:all 0.3s;}
    .btn-send:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(99,102,241,0.35);}
    .alert{border-radius:12px;border:none;}
  </style>
</head>
<body>
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card p-4 p-md-5">
        <div class="text-center mb-4">
          <div style="font-size:3rem">🔐</div>
          <h4 class="fw-bold mt-2">Forgot Password?</h4>
          <p style="color:rgba(255,255,255,0.45);font-size:0.88rem">Enter your email and we'll send you a reset OTP.</p>
        </div>
        {% if messages %}
          {% for msg in messages %}
            <div class="alert alert-info py-2 small text-center">{{ msg }}</div>
          {% endfor %}
        {% endif %}
        <form method="post">
          {% csrf_token %}
          <div class="mb-4">
            <label class="form-label small" style="color:rgba(255,255,255,0.45)">Registered Email</label>
            {{ form.email }}
          </div>
          <button type="submit" class="btn btn-send w-100 text-white">
            Send Reset OTP
          </button>
        </form>
        <p class="text-center mt-3 small">
          <a href="{% url 'accounts:login' %}" style="color:#06b6d4;text-decoration:none">← Back to Login</a>
        </p>
      </div>
    </div>
  </div>
</div>
</body>
</html>
