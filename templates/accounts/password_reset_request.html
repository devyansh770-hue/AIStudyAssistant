<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Reset Password — StudyAI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body{background:linear-gradient(135deg,#0a0a1a,#090979);min-height:100vh;display:flex;align-items:center;color:white;}
    .card{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);border-radius:20px;backdrop-filter:blur(20px);}
    .form-control{background:rgba(255,255,255,0.1)!important;border:1px solid rgba(255,255,255,0.15)!important;color:white!important;border-radius:10px;}
    .form-control::placeholder{color:rgba(255,255,255,0.4);}
    .form-control:focus{border-color:#6c63ff!important;box-shadow:0 0 15px rgba(108,99,255,0.3)!important;}
    .btn-send{background:linear-gradient(135deg,#6c63ff,#00d4ff);border:none;border-radius:10px;padding:13px;font-weight:700;}
  </style>
</head>
<body>
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card p-4 p-md-5">
        <div class="text-center mb-4">
          <div style="font-size:3rem">🔐</div>
          <h4 class="fw-bold mt-2">Forgot Password?</h4>
          <p class="text-white-50 small">Enter your email and we'll send you a reset OTP.</p>
        </div>
        {% if messages %}
          {% for msg in messages %}
            <div class="alert alert-info py-2 small text-center">{{ msg }}</div>
          {% endfor %}
        {% endif %}
        <form method="post">
          {% csrf_token %}
          <div class="mb-4">
            <label class="form-label text-white-50 small">Registered Email</label>
            {{ form.email }}
          </div>
          <button type="submit" class="btn btn-send w-100 text-white">
            Send Reset OTP
          </button>
        </form>
        <p class="text-center mt-3 small">
          <a href="{% url 'accounts:login' %}" style="color:#00d4ff">← Back to Login</a>
        </p>
      </div>
    </div>
  </div>
</div>
</body>
</html>
