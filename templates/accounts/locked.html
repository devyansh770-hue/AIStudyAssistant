<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Account Locked — StudyAI</title>
  <style>
    body{background:linear-gradient(135deg,#0a0a1a,#1a0000);min-height:100vh;display:flex;align-items:center;justify-content:center;color:white;font-family:'Segoe UI',sans-serif;}
    .box{text-align:center;padding:60px 40px;background:rgba(255,0,0,0.07);border:1px solid rgba(255,100,100,0.2);border-radius:24px;max-width:420px;}
  </style>
</head>
<body>
  <div class="box">
    <div style="font-size:4rem">🔒</div>
    <h2 style="margin:20px 0 10px;color:#ff6584">Account Temporarily Locked</h2>
    <p style="color:rgba(255,255,255,0.5);line-height:1.7">
      Too many failed login attempts detected.<br/>
      Your account has been locked for <strong style="color:white">1 hour</strong> for security.
    </p>
    <p style="color:rgba(255,255,255,0.3);font-size:0.85rem;margin-top:20px">
      If this wasn't you, your password may be compromised.<br/>
      Please reset it after the lockout period.
    </p>
    <a href="/" style="display:inline-block;margin-top:24px;padding:12px 32px;background:linear-gradient(135deg,#6c63ff,#00d4ff);color:white;text-decoration:none;border-radius:25px;font-weight:700;">
      Go Home
    </a>
  </div>
</body>
</html>
