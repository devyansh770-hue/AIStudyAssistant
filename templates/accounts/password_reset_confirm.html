<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>New Password — StudyAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#06060f,#0f172a,#1e1b4b);min-height:100vh;display:flex;align-items:center;color:white;-webkit-font-smoothing:antialiased;}
    .card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:24px;backdrop-filter:blur(20px);animation:fadeIn 0.5s ease;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    .form-input{width:100%;padding:13px 16px;border-radius:12px;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.06);color:white;outline:none;font-family:'Inter',sans-serif;transition:all 0.2s;}
    .form-input::placeholder{color:rgba(255,255,255,0.3);}
    .form-input:focus{border-color:#6366f1;box-shadow:0 0 15px rgba(99,102,241,0.25);}
    .strength-bar{height:4px;border-radius:2px;transition:all 0.3s;margin-top:6px;}
    .btn-save{background:linear-gradient(135deg,#6366f1,#06b6d4);border:none;border-radius:12px;padding:13px;font-weight:700;width:100%;color:white;cursor:pointer;font-family:'Inter',sans-serif;font-size:0.95rem;transition:all 0.3s;}
    .btn-save:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(99,102,241,0.35);}
    .req{font-size:0.75rem;display:flex;align-items:center;gap:6px;margin-bottom:4px;transition:all 0.2s;}
    .req.ok{color:#10b981;} .req.fail{color:rgba(255,255,255,0.3);}
    .alert{border-radius:12px;border:none;}
  </style>
</head>
<body>
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card p-4 p-md-5">
        <div class="text-center mb-4">
          <div style="font-size:3rem">🔒</div>
          <h4 class="fw-bold mt-2">Set New Password</h4>
          <p style="color:rgba(255,255,255,0.45);font-size:0.88rem">Choose a strong password to secure your account.</p>
        </div>
        {% if messages %}
          {% for msg in messages %}
            <div class="alert alert-danger py-2 small">{{ msg }}</div>
          {% endfor %}
        {% endif %}
        <form method="post">
          {% csrf_token %}
          <div class="mb-2">
            <label class="small" style="color:rgba(255,255,255,0.45);margin-bottom:6px;display:block">New Password</label>
            <div style="position:relative">
              {{ form.new_password }}
              <i class="bi bi-eye" onclick="toggle('newPassword',this)"
                 style="position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;color:rgba(255,255,255,0.4)"></i>
            </div>
            <div class="strength-bar" id="strengthBar" style="background:#333;width:0%"></div>
          </div>
          <div class="mb-3 p-2 rounded" style="background:rgba(255,255,255,0.03);border-radius:10px">
            <div class="req fail" id="req-len"><i class="bi bi-circle"></i> At least 8 characters</div>
            <div class="req fail" id="req-upper"><i class="bi bi-circle"></i> One uppercase letter</div>
            <div class="req fail" id="req-num"><i class="bi bi-circle"></i> One number</div>
            <div class="req fail" id="req-special"><i class="bi bi-circle"></i> One special character</div>
          </div>
          <div class="mb-4">
            <label class="small" style="color:rgba(255,255,255,0.45);margin-bottom:6px;display:block">Confirm Password</label>
            {{ form.confirm_password }}
          </div>
          <button type="submit" class="btn-save">
            <i class="bi bi-check-circle"></i> Save New Password
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
<script>
function toggle(id, icon) {
  const el = document.getElementById(id);
  if (!el) return;
  el.type = el.type === 'password' ? 'text' : 'password';
  icon.className = el.type === 'password' ? 'bi bi-eye' : 'bi bi-eye-slash';
  icon.style.cssText = 'position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;color:rgba(255,255,255,0.4)';
}

document.getElementById('newPassword').addEventListener('input', function() {
  const v = this.value;
  const checks = {
    'req-len':     v.length >= 8,
    'req-upper':   /[A-Z]/.test(v),
    'req-num':     /\d/.test(v),
    'req-special': /[!@#$%^&*(),.?":{}|<>_\-]/.test(v),
  };
  let score = Object.values(checks).filter(Boolean).length;
  Object.entries(checks).forEach(([id, ok]) => {
    const el = document.getElementById(id);
    el.className = 'req ' + (ok ? 'ok' : 'fail');
    el.querySelector('i').className = ok ? 'bi bi-check-circle-fill' : 'bi bi-circle';
  });
  const bar = document.getElementById('strengthBar');
  const colors = ['#f43f5e','#f59e0b','#f59e0b','#10b981','#10b981'];
  bar.style.width = (score * 25) + '%';
  bar.style.background = colors[score];
});
</script>
</body>
</html>
