<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Register — StudyAI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <style>
    body { background: linear-gradient(135deg, #1a237e 0%, #0288d1 100%); min-height: 100vh; display: flex; align-items: center; }
    .card { border-radius: 16px; border: none; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
  </style>
</head>
<body>
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card p-4 p-md-5">
        <div class="text-center mb-4">
          <i class="bi bi-mortarboard-fill text-primary" style="font-size:2.5rem"></i>
          <h2 class="fw-bold mt-2" style="color:#1a237e">Create Account</h2>
          <p class="text-muted">Start your AI-powered study journey</p>
        </div>
        {% if messages %}
          {% for msg in messages %}
            <div class="alert alert-danger">{{ msg }}</div>
          {% endfor %}
        {% endif %}
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label fw-semibold">Username</label>
            {{ form.username }}
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Email</label>
            {{ form.email }}
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Password</label>
            {{ form.password1 }}
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Confirm Password</label>
            {{ form.password2 }}
          </div>
          <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Create Account</button>
        </form>
        <p class="text-center mt-3 text-muted">Already have an account? <a href="{% url 'accounts:login' %}">Login</a></p>
      </div>
    </div>
  </div>
</div>
</body>
</html>
